<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Budget Tracker 7.0 - Encrypted Cloud Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1565c0">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
            color: #1565c0;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #555;
        }
        .card p {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #1565c0;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #1565c0;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #0d47a1;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="login-section">
    <h1>Secure Login</h1>
    <p style="text-align: center;">Enter your Master Password to decrypt your JSONBin Vault.</p>
    <input type="password" id="master-password" placeholder="Master Password">
    <button onclick="unlockVault()">Decrypt & Open</button>
</div>

<div class="container hidden" id="dashboard-section">
    <h1>Financial Dashboard</h1>
    
    <div class="dashboard-grid">
        <div class="card">
            <h3>Food Limit</h3>
            <p>140,000.00 HUF</p>
        </div>
        <div class="card">
            <h3>Rent Allocation</h3>
            <p>155,000.00 HUF</p>
        </div>
        <div class="card" style="grid-column: span 2;">
            <h3>August Target</h3>
            <p>399,000.00 HUF</p>
        </div>
    </div>

    <div>
        <canvas id="budgetChart"></canvas>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <h2>Add New Transaction</h2>
    <input type="number" id="amount" placeholder="Amount (HUF)">
    <input type="text" id="description" placeholder="Description (e.g., Groceries)">
    <button onclick="addTransaction()">Save to Encrypted Vault</button>
</div>

<script>
    // System Variables
    let secretKey = '';
    const JSONBIN_URL = 'YOUR_JSONBIN_URL_HERE'; // Replace with your Bin URL
    const JSONBIN_API_KEY = 'YOUR_API_KEY_HERE'; // Replace with your X-Access-Key
    let chartInstance = null;

    function unlockVault() {
        const pass = document.getElementById('master-password').value;
        if(pass.length < 4) {
            alert('Please enter a valid password.');
            return;
        }
        secretKey = pass;
        
        // Hide login, show dashboard
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        
        initChart();
        // Here you would normally fetch and decrypt the JSONBin data
        console.log("Vault Unlocked. Ready to sync with JSONBin.");
    }

    function addTransaction() {
        const amount = document.getElementById('amount').value;
        const desc = document.getElementById('description').value;
        
        if(!amount || !desc) {
            alert('Please fill out both fields.');
            return;
        }

        // Encryption Process
        const dataToEncrypt = JSON.stringify({ amount: amount, desc: desc, date: new Date().toISOString() });
        const encryptedData = CryptoJS.AES.encrypt(dataToEncrypt, secretKey).toString();
        
        console.log("Encrypted Payload:", encryptedData);
        alert('Transaction encrypted and prepared for cloud upload!');
        
        // Clear fields
        document.getElementById('amount').value = '';
        document.getElementById('description').value = '';
    }

    function initChart() {
        const ctx = document.getElementById('budgetChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Food', 'Rent', 'August Savings'],
                datasets: [{
                    data: [140000.00, 155000.00, 399000.00],
                    backgroundColor: ['#4caf50', '#ff9800', '#1565c0']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }
</script>

</body>
</html>
