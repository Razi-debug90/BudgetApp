<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Budget Tracker 9.00 - Encrypted & Mobile Ready</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1565c0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        /* --- ORIGINAL DESKTOP STYLES (VERSION 7.00) --- */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; color: #333; max-width: 1000px; margin: 40px auto; padding: 20px; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .action-buttons button { background-color: #1565c0; margin-left: 10px; padding: 10px 15px; border-radius: 5px; color: white; border: none; cursor: pointer; font-weight: bold; }
        .action-buttons button:hover { background-color: #0d47a1; }
        .action-buttons .settings-btn { background-color: #424242; }
        .action-buttons .sync-btn { background-color: #6a1b9a; }
        .action-buttons .sync-btn:hover { background-color: #4a148c; }
        
        .goal-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .goal-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .progress-bar-bg { background-color: #eee; height: 25px; border-radius: 12px; overflow: hidden; position: relative; }
        .progress-bar-fill { background-color: #2e7d32; height: 100%; width: 0%; transition: width 0.5s ease-in-out; }
        .progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-weight: bold; font-size: 12px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .card h3 { margin-top: 0; font-size: 13px; color: #666; text-transform: uppercase; }
        .card .amount { font-size: 20px; font-weight: bold; }
        .text-green { color: #2e7d32; } .text-red { color: #c62828; } .text-blue { color: #1565c0; } .text-purple { color: #6a1b9a; }
        
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .controls { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        input { flex: 1; min-width: 120px; }
        .controls button { background-color: #333; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; padding: 10px 20px; }
        .controls button:hover { background-color: #555; }
        
        .auto-fill-btn { background-color: #e65100; width: 100%; margin-bottom: 20px; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .auto-fill-btn:hover { background-color: #bf360c; }

        table { width: 100%; background: white; border-collapse: collapse; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; font-weight: bold; color: #555; }
        .inline-edit { border: 1px solid transparent; background: transparent; padding: 5px; border-radius: 5px; font-family: inherit; font-size: 14px; cursor: pointer; width: 100%; box-sizing: border-box; }
        .inline-edit:hover, .inline-edit:focus { border: 1px solid #2e7d32; background: #f1f8e9; outline: none; }
        .delete-btn { background-color: #ff5252; color: white; border: none; padding: 5px 10px; font-size: 12px; border-radius: 3px; cursor: pointer;}
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 400px; max-width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto;}
        .modal-content h3 { margin-top: 0; margin-bottom: 20px; }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #555;}
        .setting-group input { width: 100%; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .modal-actions .save-btn { background-color: #2e7d32; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;}
        #syncStatus { font-size: 12px; font-weight: bold; color: #6a1b9a; margin-top: 5px; text-align: right; }

        /* --- MOBILE RESPONSIVE RULES (ADDED FOR ANDROID) --- */
        @media (max-width: 768px) {
            body { margin: 10px auto; padding: 10px; }
            .header-controls { flex-direction: column; align-items: stretch; gap: 15px; }
            .action-buttons { display: flex; justify-content: space-between; width: 100%; gap: 5px; }
            .action-buttons button, .action-buttons select { flex: 1; margin: 0; text-align: center; font-size: 12px; padding: 8px; }
            .dashboard { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .card { padding: 15px; }
            .card .amount { font-size: 16px; }
            .charts-container { grid-template-columns: 1fr; gap: 15px; }
            table { display: block; overflow-x: auto; white-space: nowrap; }
            .controls { flex-direction: column; align-items: stretch; }
            .controls input, .controls select, .controls button { width: 100%; box-sizing: border-box; margin-bottom: 5px; }
            #syncStatus { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="header-controls">
        <h2>Financial Dashboard</h2>
        <div class="action-buttons">
            <select id="timeFilter" onchange="updateUI()" style="padding: 10px; border-radius: 5px; font-weight:bold;">
                <option value="month">This Month</option>
                <option value="all">All Time</option>
            </select>
            <button class="sync-btn" onclick="pushToCloud()">☁️ Push</button>
            <button class="sync-btn" onclick="pullFromCloud()">☁️ Pull</button>
            <button class="settings-btn" onclick="openSettings()">⚙️ Settings</button>
        </div>
    </div>
    <div id="syncStatus"></div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <h3>Application Settings</h3>
            <div class="setting-group"><label>Total Savings Target (HUF)</label><input type="number" id="setSavings" step="0.01"></div>
            <div class="setting-group"><label>Monthly Food Warning Limit (HUF)</label><input type="number" id="setFood" step="0.01"></div>
            <hr style="border:0; border-top: 1px solid #eee; margin: 20px 0;">
            <div class="setting-group"><label>Baseline Monthly Income (HUF)</label><input type="number" id="setInc" step="0.01"></div>
            <div class="setting-group"><label>Baseline Monthly Rent (HUF)</label><input type="number" id="setRent" step="0.01"></div>
            <div class="setting-group"><label>Baseline Monthly Bills (HUF)</label><input type="number" id="setBills" step="0.01"></div>
            <hr style="border:0; border-top: 1px solid #eee; margin: 20px 0;">
            <h4 style="margin: 0 0 10px 0;">Cloud Sync Configuration</h4>
            <div class="setting-group"><label>API Endpoint URL (JSONBin)</label><input type="text" id="setApiUrl"></div>
            <div class="setting-group"><label>API Key / Access Token</label><input type="password" id="setApiKey"></div>
            <div class="setting-group"><label>Master Encryption Password</label><input type="password" id="setMasterPass" placeholder="Required to encrypt/decrypt data"></div>
            <div class="modal-actions">
                <button onclick="closeSettings()" style="padding:10px; border-radius:5px; border:none; cursor:pointer;">Cancel</button>
                <button class="save-btn" onclick="saveSettings()">Apply Settings</button>
            </div>
        </div>
    </div>

    <div class="goal-container">
        <div class="goal-header"><span>Primary Savings Progress</span><span id="goalText">0.00 / 0.00 HUF</span></div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="goalFill"></div><div class="progress-text" id="goalPercent">0.00%</div></div>
    </div>

    <div class="dashboard">
        <div class="card"><h3>Total Income</h3><div class="amount text-green" id="totalIncome">0.00 HUF</div></div>
        <div class="card"><h3>Total Expenses</h3><div class="amount text-red" id="totalExpenses">0.00 HUF</div></div>
        <div class="card"><h3>Remaining Balance</h3><div class="amount text-blue" id="balance">0.00 HUF</div></div>
        <div class="card"><h3>Daily Safe to Spend</h3><div class="amount text-purple" id="safeToSpend">0.00 HUF</div></div>
    </div>

    <button class="auto-fill-btn" onclick="injectMonthlyBaseline()">⚡ Inject Monthly Baseline</button>

    <form class="controls" id="transactionForm">
        <input type="date" id="dateInput" required>
        <input type="text" id="descInput" placeholder="Description" required>
        <select id="categoryInput" required>
            <option value="" disabled selected>Category...</option>
            <option value="Income">Income</option>
            <option value="Housing">Housing</option>
            <option value="Utilities">Utilities</option>
            <option value="Savings">Savings</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Other">Other</option>
        </select>
        <input type="number" id="amountInput" placeholder="Amount (HUF)" step="0.01" required>
        <select id="typeInput"><option value="expense">Expense</option><option value="income">Income</option></select>
        <button type="submit">Add</button>
    </form>

    <div class="charts-container">
        <div class="chart-box"><canvas id="expensePieChart"></canvas></div>
        <div class="chart-box"><canvas id="cashFlowBarChart"></canvas></div>
    </div>

    <table>
        <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount (HUF)</th><th>Action</th></tr></thead>
        <tbody id="transactionList"></tbody>
    </table>

    <script>
        let transactions = [];
        let pieChartInstance = null; let barChartInstance = null;
        let appConfig = {
            savingsTarget: 399000.00, foodCeiling: 140000.00, baseIncome: 525000.00, baseRent: 155000.00, baseBills: 50000.00,
            apiUrl: "", apiKey: "", masterPass: ""
        };

        function loadData() {
            const savedSettings = localStorage.getItem('budgetConfigV9');
            if (savedSettings) appConfig = JSON.parse(savedSettings);
            const savedData = localStorage.getItem('budgetDataV9') || localStorage.getItem('budgetDataV7');
            if (savedData) transactions = JSON.parse(savedData);
            document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
            updateUI();
        }

        function persistData() {
            localStorage.setItem('budgetDataV9', JSON.stringify(transactions));
        }

        function formatDecimal(num) { return parseFloat(num).toFixed(2); }

        function openSettings() {
            document.getElementById('setSavings').value = appConfig.savingsTarget; document.getElementById('setFood').value = appConfig.foodCeiling;
            document.getElementById('setInc').value = appConfig.baseIncome; document.getElementById('setRent').value = appConfig.baseRent;
            document.getElementById('setBills').value = appConfig.baseBills; document.getElementById('setApiUrl').value = appConfig.apiUrl;
            document.getElementById('setApiKey').value = appConfig.apiKey; document.getElementById('setMasterPass').value = appConfig.masterPass;
            document.getElementById('settingsModal').style.display = 'flex';
        }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        
        function saveSettings() {
            appConfig.savingsTarget = parseFloat(document.getElementById('setSavings').value) || 0.00;
            appConfig.foodCeiling = parseFloat(document.getElementById('setFood').value) || 0.00;
            appConfig.baseIncome = parseFloat(document.getElementById('setInc').value) || 0.00;
            appConfig.baseRent = parseFloat(document.getElementById('setRent').value) || 0.00;
            appConfig.baseBills = parseFloat(document.getElementById('setBills').value) || 0.00;
            appConfig.apiUrl = document.getElementById('setApiUrl').value;
            appConfig.apiKey = document.getElementById('setApiKey').value;
            appConfig.masterPass = document.getElementById('setMasterPass').value;
            localStorage.setItem('budgetConfigV9', JSON.stringify(appConfig));
            closeSettings(); updateUI();
        }

        async function pushToCloud() {
            if (!appConfig.apiUrl || !appConfig.masterPass) return alert("Please configure API URL and Master Password in Settings first.");
            document.getElementById('syncStatus').innerText = "Encrypting and Pushing...";
            try {
                const ciphertext = CryptoJS.AES.encrypt(JSON.stringify(transactions), appConfig.masterPass).toString();
                const response = await fetch(appConfig.apiUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': appConfig.apiKey },
                    body: JSON.stringify({ payload: ciphertext })
                });
                if (response.ok) document.getElementById('syncStatus').innerText = "Successfully synced to cloud! ✔️";
                else document.getElementById('syncStatus').innerText = "Sync failed. Check API credentials.";
            } catch (err) { document.getElementById('syncStatus').innerText = "Connection error."; }
            setTimeout(() => document.getElementById('syncStatus').innerText = "", 3000);
        }

        async function pullFromCloud() {
            if (!appConfig.apiUrl || !appConfig.masterPass) return alert("Please configure API URL and Master Password in Settings first.");
            document.getElementById('syncStatus').innerText = "Fetching and Decrypting...";
            try {
                const response = await fetch(appConfig.apiUrl + '/latest', { headers: { 'X-Master-Key': appConfig.apiKey } });
                const data = await response.json();
                if (data.record && data.record.payload) {
                    const bytes = CryptoJS.AES.decrypt(data.record.payload, appConfig.masterPass);
                    const decryptedData = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    
                    if(confirm("Cloud data fetched successfully. Overwrite local data?")) {
                        transactions = decryptedData; persistData(); updateUI();
                        document.getElementById('syncStatus').innerText = "Data updated! ✔️";
                    } else { document.getElementById('syncStatus').innerText = "Pull cancelled."; }
                }
            } catch (err) { alert("Failed to pull or decrypt. Incorrect password?"); document.getElementById('syncStatus').innerText = ""; }
            setTimeout(() => document.getElementById('syncStatus').innerText = "", 3000);
        }

        function updateTransactionField(id, field, value) {
            const index = transactions.findIndex(t => t.id === id);
            if (index !== -1) {
                transactions[index][field] = field === 'amount' ? parseFloat(value) || 0.00 : value;
                persistData(); updateUI();
            }
        }

        function filterTransactions() {
            const filter = document.getElementById('timeFilter').value; const now = new Date();
            return transactions.filter(t => {
                const tDate = new Date(t.date);
                if (filter === 'all') return true;
                return tDate.getFullYear() === now.getFullYear() && tDate.getMonth() === now.getMonth();
            });
        }

        function updateUI() {
            const filteredTransactions = filterTransactions(); const list = document.getElementById('transactionList'); list.innerHTML = '';
            let income = 0.00, expenses = 0.00, totalSavings = 0.00; const now = new Date();

            transactions.forEach(t => { if(t.category === 'Savings' && t.type === 'expense') totalSavings += parseFloat(t.amount); });

            filteredTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            filteredTransactions.forEach(t => {
                if (t.type === 'income') income += parseFloat(t.amount); if (t.type === 'expense') expenses += parseFloat(t.amount);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="date" class="inline-edit" value="${t.date}" onchange="updateTransactionField(${t.id}, 'date', this.value)"></td>
                    <td><input type="text" class="inline-edit" value="${t.desc}" onchange="updateTransactionField(${t.id}, 'desc', this.value)"></td>
                    <td><span style="background:#eee; padding:3px 8px; border-radius:10px; font-size:12px;">${t.category}</span></td>
                    <td style="text-transform: capitalize; color: ${t.type === 'income' ? '#2e7d32' : '#c62828'}">${t.type}</td>
                    <td><input type="number" class="inline-edit" value="${formatDecimal(t.amount)}" step="0.01" style="text-align:right; font-weight:bold; color: ${t.type === 'income' ? '#2e7d32' : '#c62828'}" onchange="updateTransactionField(${t.id}, 'amount', this.value)"></td>
                    <td><button class="delete-btn" onclick="deleteTransaction(${t.id})">Delete</button></td>
                `;
                list.appendChild(row);
            });

            const balance = income - expenses;
            const daysLeft = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate() + 1;
            const safeDaily = balance > 0.00 ? balance / daysLeft : 0.00;

            document.getElementById('totalIncome').innerText = `${formatDecimal(income)} HUF`; document.getElementById('totalExpenses').innerText = `${formatDecimal(expenses)} HUF`;
            document.getElementById('balance').innerText = `${formatDecimal(balance)} HUF`; document.getElementById('safeToSpend').innerText = `${formatDecimal(safeDaily)} HUF / day`;

            let percent = appConfig.savingsTarget > 0 ? (totalSavings / appConfig.savingsTarget) * 100.00 : 0.00;
            if (percent > 100.00) percent = 100.00;
            document.getElementById('goalText').innerText = `${formatDecimal(totalSavings)} / ${formatDecimal(appConfig.savingsTarget)} HUF`;
            document.getElementById('goalFill').style.width = `${formatDecimal(percent)}%`; document.getElementById('goalPercent').innerText = `${formatDecimal(percent)}%`;

            const expenseData = filteredTransactions.filter(t => t.type === 'expense');
            const categories = {};
            expenseData.forEach(t => categories[t.category] = (categories[t.category] || 0.00) + parseFloat(t.amount));
            let totalInc = 0.00, totalExp = 0.00;
            filteredTransactions.forEach(t => t.type === 'income' ? totalInc += parseFloat(t.amount) : totalExp += parseFloat(t.amount));

            const ctxPie = document.getElementById('expensePieChart').getContext('2d');
            if (pieChartInstance) pieChartInstance.destroy();
            pieChartInstance = new Chart(ctxPie, {
                type: 'doughnut',
                data: { labels: Object.keys(categories), datasets: [{ data: Object.values(categories), backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'] }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Expenses by Category' } }, animation: {duration: 0} }
            });

            const ctxBar = document.getElementById('cashFlowBarChart').getContext('2d');
            if (barChartInstance) barChartInstance.destroy();
            barChartInstance = new Chart(ctxBar, {
                type: 'bar',
                data: { labels: ['Income', 'Expenses'], datasets: [{ data: [totalInc, totalExp], backgroundColor: ['#2e7d32', '#c62828'] }] },
                options: { responsive: true, plugins: { title: { display: true, text: 'Income vs Expenses' }, legend: { display: false } }, scales: { y: { beginAtZero: true } }, animation: {duration: 0} }
            });
        }

        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            transactions.push({ id: Date.now(), date: document.getElementById('dateInput').value, desc: document.getElementById('descInput').value, category: document.getElementById('categoryInput').value, amount: parseFloat(document.getElementById('amountInput').value), type: document.getElementById('typeInput').value });
            persistData(); updateUI();
            document.getElementById('descInput').value = ''; document.getElementById('amountInput').value = ''; document.getElementById('categoryInput').selectedIndex = 0;
        });

        function deleteTransaction(id) { transactions = transactions.filter(t => t.id !== id); persistData(); updateUI(); }
        function injectMonthlyBaseline() { const today = new Date().toISOString().split('T')[0]; transactions.push({ id: Date.now() + 1, date: today, desc: 'Salary', category: 'Income', amount: appConfig.baseIncome, type: 'income' }, { id: Date.now() + 2, date: today, desc: 'Rent', category: 'Housing', amount: appConfig.baseRent, type: 'expense' }, { id: Date.now() + 3, date: today, desc: 'Bills', category: 'Utilities', amount: appConfig.baseBills, type: 'expense' }); persistData(); updateUI(); }
        
        document.getElementById('categoryInput').addEventListener('change', function(e) {
            document.getElementById('typeInput').value = e.target.value === 'Income' ? 'income' : 'expense';
        });

        loadData();
    </script>
</body>
</html>
